name: Scheduled ML Model Retraining

on:
  schedule:
    # Run every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual execution via GitHub Action dashboard

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn joblib

    - name: Generate Synthetic Medical Data
      run: |
        python ml/generate_data.py

    - name: Train Random Forest Model
      run: |
        python ml/train.py

    - name: Upload Model Weights Artifact
      uses: actions/upload-artifact@v4
      with:
        name: trained-pcos-model
        path: ml/models/pcos_rf_model.pkl
        retention-days: 30
