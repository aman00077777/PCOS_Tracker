version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pcos_backend
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app
      - shared_models:/app/ml/models
    environment:
      - DATABASE_URL=sqlite:///./pcos_tracker.db
      - SECRET_KEY=supersecretkeyforpcostrackingapp12345!
      - MODEL_PATH=ml/models/pcos_rf_model.pkl
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pcos_frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
    restart: always

volumes:
  sqlite_data:
  shared_models:
